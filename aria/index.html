<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA — Warranty Support | Chassis Labs</title>
  <meta name="description" content="ARIA is your AI warranty support assistant. Get instant answers about your BC Housing 2-5-10 warranty coverage.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0e0f12; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    .nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; border-bottom: 1px solid #1f2028; }
    .logo { font-weight: 600; letter-spacing: -0.5px; text-decoration: none; color: #fff; }
    .nav-links a { color: #aaa; text-decoration: none; margin-left: 25px; font-size: 14px; }
    .nav-links a:hover { color: #fff; }
    .nav-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #60a5fa; background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.25); padding: 3px 10px; border-radius: 20px; }
    .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 20px; }
    .eyebrow { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #6b7280; margin-bottom: 16px; }
    h1 { font-size: 52px; font-weight: 500; letter-spacing: -1px; margin-bottom: 16px; }
    .subtitle { color: #9ca3af; font-size: 18px; max-width: 500px; margin: 0 auto 48px; line-height: 1.6; }
    .cta-btn { display: inline-flex; align-items: center; gap: 10px; background: #685FFF; color: #fff; border: none; padding: 14px 28px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
    .cta-btn:hover { background: #5a52e8; }
    .cta-btn svg { width: 18px; height: 18px; }
    .features { display: flex; gap: 24px; margin-top: 64px; flex-wrap: wrap; justify-content: center; }
    .feature { background: #13141a; border: 1px solid #1f2028; border-radius: 12px; padding: 20px 24px; max-width: 200px; text-align: left; }
    .feature-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; margin-bottom: 8px; }
    .feature-value { font-size: 14px; color: #e5e7eb; }
    @media (max-width: 600px) { .nav { padding: 16px 20px; } h1 { font-size: 36px; } .features { gap: 12px; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="logo">Chassis Labs</a>
    <div style="display:flex;align-items:center;gap:20px;">
      <span class="nav-badge">Warranty Support</span>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/#contact">Contact</a>
      </div>
    </div>
  </nav>
  <div class="hero">
    <div class="eyebrow">AI Warranty Assistant</div>
    <h1>Ask ARIA</h1>
    <p class="subtitle">Instant answers about your BC Housing 2-5-10 warranty coverage — available 24/7.</p>
    <button class="cta-btn" onclick="openAria()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      Chat with ARIA
    </button>
    <div class="features">
      <div class="feature"><div class="feature-label">Coverage</div><div class="feature-value">2-5-10 Year Warranty</div></div>
      <div class="feature"><div class="feature-label">Claims</div><div class="feature-value">info@chassislabs.ai</div></div>
      <div class="feature"><div class="feature-label">Available</div><div class="feature-value">24 / 7</div></div>
    </div>
  </div>
  <script defer data-relevanceai-share-id="bcbe5a/afcb6d6a-9301-49a7-89fe-b2c89ca18179/4849a6c2-bbd3-4dfc-abe7-d11bcd31fccf" src="https://app.relevanceai.com/embed/chat-bubble.js" data-share-styles="hide_tool_steps=false&hide_file_uploads=false&hide_conversation_list=false&bubble_style=agent&primary_color=%23685FFF&bubble_icon=pd%2Fchat&input_placeholder_text=Type+your+message...&hide_logo=false&hide_description=false" ></script>
  <script>
    function openAria() {
      const btn = document.querySelector('[data-relevanceai-share-id]');
      if (btn) btn.click();
      // Fallback: find the bubble button and click it
      setTimeout(() => {
        const bubble = document.querySelector('.relevanceai-chat-bubble, [class*="bubble"], [class*="chat-btn"]');
        if (bubble) bubble.click();
      }, 500);
    }
  </script>
</body>
</html>
