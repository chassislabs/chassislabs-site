<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIA – Warranty Support | Chassis Labs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #0e0f12; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { display: flex; align-items: center; justify-content: space-between; height: 50px; padding: 0 24px; border-bottom: 1px solid #1f2028; background-color: #0e0f12; flex-shrink: 0; }
        .nav-left { display: flex; align-items: center; gap: 32px; }
        .logo { font-size: 16px; font-weight: 600; color: #fff; text-decoration: none; }
        .logo:hover { opacity: 0.8; }
        .nav-badge { display: inline-flex; align-items: center; background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .nav-right { display: flex; align-items: center; gap: 24px; }
        .nav-link { color: #aaa; text-decoration: none; font-size: 14px; }
        .nav-link:hover { color: #fff; }
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .messages::-webkit-scrollbar { width: 6px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background-color: #1f2028; border-radius: 4px; }
        .message { display: flex; gap: 12px; align-items: flex-start; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { justify-content: flex-end; }
        .message.user .message-content { background-color: #685FFF; border-radius: 12px 12px 2px 12px; padding: 10px 14px; max-width: 70%; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
        .message.aria .message-content { background-color: #13141a; border: 1px solid #1f2028; border-radius: 2px 12px 12px 12px; padding: 10px 14px; max-width: 70%; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
        .message-avatar { flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%; background-color: #685FFF; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; }
        .typing-indicator { display: flex; gap: 4px; padding: 6px 0; }
        .typing-dot { width: 7px; height: 7px; border-radius: 50%; background-color: #685FFF; animation: bounce 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100% { opacity: 0.4; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-6px); } }
        .input-area { display: flex; gap: 10px; padding: 14px 24px; border-top: 1px solid #1f2028; background-color: #0e0f12; flex-shrink: 0; }
        .input-field { flex: 1; background-color: #13141a; border: 1px solid #1f2028; border-radius: 8px; padding: 11px 14px; color: #fff; font-size: 14px; font-family: inherit; transition: border-color 0.2s; }
        .input-field:focus { outline: none; border-color: #685FFF; }
        .input-field::placeholder { color: #555; }
        .send-button { background-color: #685FFF; border: none; border-radius: 8px; padding: 11px 22px; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: background-color 0.2s, opacity 0.2s; flex-shrink: 0; }
        .send-button:hover:not(:disabled) { background-color: #7a73ff; }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; }
        @media (max-width: 600px) {
            .message.user .message-content, .message.aria .message-content { max-width: 88%; }
            nav { padding: 0 14px; }
            .messages { padding: 14px; }
            .input-area { padding: 10px 14px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="/" class="logo">Chassis Labs</a>
            <span class="nav-badge">Warranty Support</span>
        </div>
        <div class="nav-right">
            <a href="/" class="nav-link">Home</a>
            <a href="/#contact" class="nav-link">Contact</a>
        </div>
    </nav>
    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="messageInput" class="input-field" placeholder="Ask me about your BC Housing warranty..." autocomplete="off" />
            <button id="sendButton" class="send-button">Send</button>
        </div>
    </div>
    <script>
        let conversationId = null;
        let isWaiting = false;
        const msgs = document.getElementById('messages');
        const inp = document.getElementById('messageInput');
        const btn = document.getElementById('sendButton');

        function addMsg(text, type) {
            const el = document.createElement('div');
            el.className = 'message ' + type;
            if (type === 'aria') {
                const av = document.createElement('div');
                av.className = 'message-avatar';
                av.textContent = 'A';
                const ct = document.createElement('div');
                ct.className = 'message-content';
                ct.textContent = text;
                el.appendChild(av); el.appendChild(ct);
            } else {
                const ct = document.createElement('div');
                ct.className = 'message-content';
                ct.textContent = text;
                el.appendChild(ct);
            }
            msgs.appendChild(el);
            msgs.scrollTop = msgs.scrollHeight;
            return el;
        }

        function showTyping() {
            const el = document.createElement('div');
            el.className = 'message aria'; el.id = 'typing';
            const av = document.createElement('div');
            av.className = 'message-avatar'; av.textContent = 'A';
            const ti = document.createElement('div');
            ti.className = 'typing-indicator';
            ti.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            el.appendChild(av); el.appendChild(ti);
            msgs.appendChild(el); msgs.scrollTop = msgs.scrollHeight;
        }

        function hideTyping() { const e = document.getElementById('typing'); if (e) e.remove(); }

        async function send() {
            const text = inp.value.trim();
            if (!text || isWaiting) return;
            addMsg(text, 'user');
            inp.value = ''; isWaiting = true; btn.disabled = true;
            showTyping();
            try {
                const res = await fetch('/aria-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, conversation_id: conversationId })
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                hideTyping();
                const reader = res.body.getReader();
                const dec = new TextDecoder();
                let buf = '', msgEl = null, msgText = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buf += dec.decode(value, { stream: true });
                    const lines = buf.split('\n');
                    for (let i = 0; i < lines.length - 1; i++) {
                        const line = lines[i].trim();
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const d = JSON.parse(line.slice(6));
                            if (d.type === 'chunk') {
                                if (!msgEl) {
                                    msgEl = document.createElement('div');
                                    msgEl.className = 'message aria';
                                    const av = document.createElement('div');
                                    av.className = 'message-avatar'; av.textContent = 'A';
                                    const ct = document.createElement('div');
                                    ct.className = 'message-content'; ct.id = 'streaming';
                                    msgEl.appendChild(av); msgEl.appendChild(ct);
                                    msgs.appendChild(msgEl);
                                }
                                msgText += d.text;
                                document.getElementById('streaming').textContent = msgText;
                                msgs.scrollTop = msgs.scrollHeight;
                            } else if (d.type === 'done') {
                                conversationId = d.conversation_id;
                                const s = document.getElementById('streaming');
                                if (s) s.id = '';
                            } else if (d.type === 'error') {
                                hideTyping();
                                addMsg(d.message || 'Something went wrong. Please try again.', 'aria');
                            }
                        } catch(e) {}
                    }
                    buf = lines[lines.length - 1];
                }
            } catch(e) {
                hideTyping();
                addMsg('Something went wrong. Please try again.', 'aria');
            } finally {
                isWaiting = false; btn.disabled = false; inp.focus();
            }
        }

        btn.addEventListener('click', send);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
        addMsg("Hi, I'm ARIA — your BC Housing 2-5-10 Warranty Assistant. Ask me anything about your coverage.", 'aria');
        inp.focus();
    </script>
</body>
</html>
