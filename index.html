<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chassis Labs</title>
  <style>
    /* Reset & base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    /* Hero title */
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 15px;
      background: linear-gradient(90deg, #4f46e5, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Subtitle */
    p.subtitle {
      font-size: 1.25rem;
      opacity: 0.75;
      margin-bottom: 30px;
    }

    /* Email / footer */
    p.contact {
      font-size: 1rem;
      opacity: 0.6;
      margin-top: 40px;
      word-break: break-all;
    }

    /* Button style (optional CTA) */
    a.cta {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      background: #4f46e5;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.3s ease;
    }
    a.cta:hover {
      background: #3b82f6;
    }

    /* Responsive */
    @media (max-width: 480px) {
      h1 { font-size: 2.25rem; }
      p.subtitle { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Chassis Labs</h1>
    <p class="subtitle">The Backbone for Next-Gen Real Estate Projects</p>
    <a href="mailto:info@chassislabs.com" class="cta">Get in Touch</a>
  </div>

  <p class="contact">info@chassislabs.com</p>
</body>
</html>
